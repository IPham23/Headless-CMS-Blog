<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Headless CMS Blog</title>
    <!--SEO-->

    <meta
      name="description"
      content="Welcome to My Website. Explore my blog for the latest insights in web development."
    />

    <!-- Google Fonts: preconnect + non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Network dependency tree -->
    <link rel="preconnect" href="https://public-api.wordpress.com" />
    <link rel="preconnect" href="https://coladillaheadlessdemo.wordpress.com" />
    <link rel="dns-prefetch" href="https://public-api.wordpress.com" />
    <link rel="dns-prefetch" href="https://coladillaheadlessdemo.wordpress.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
